components:
  examples:
    ListNamespacesEmptyExample:
      summary: An empty list of namespaces
      value:
        namespaces: []
    ListNamespacesNonEmptyExample:
      summary: A non-empty list of namespaces
      value:
        namespaces:
        - accounting
        - credits
  parameters:
    id:
      description: |
        `string identifier` of an object in a namespace, following the Lance Namespace spec.
        When the value is equal to the delimiter, it represents the root namespace.
        For example, `v1/namespace/$/list` performs a `ListNamespace` on the root namespace.
      explode: false
      in: path
      name: id
      required: true
      schema:
        type: string
      style: simple
    delimiter:
      description: |
        An optional delimiter of the `string identifier`, following the Lance Namespace spec.
        When not specified, the `$` delimiter must be used.
      explode: true
      in: query
      name: delimiter
      required: false
      schema:
        type: string
      style: form
    branch:
      description: |
        Optional branch to target. When not specified, the main branch is used.
        Used by branch-scoped operations that cannot carry a `branch` field in
        their request body (Arrow IPC stream and bodyless operations). Operations
        with a JSON request body carry `branch` as a body field instead.
      explode: true
      in: query
      name: branch
      required: false
      schema:
        type: string
      style: form
    page_token:
      description: Pagination token from a previous request
      explode: true
      in: query
      name: page_token
      required: false
      schema:
        $ref: '#/components/schemas/PageToken'
      style: form
    limit:
      description: Maximum number of items to return
      explode: true
      in: query
      name: limit
      required: false
      schema:
        $ref: '#/components/schemas/PageLimit'
      style: form
    with_table_uri:
      description: Whether to include the table URI in the response
      explode: true
      in: query
      name: with_table_uri
      required: false
      schema:
        default: false
        type: boolean
      style: form
    include_declared:
      description: |
        When true (default), includes tables that have been declared in the namespace
        but not yet created on storage, in addition to tables that have
        been created. When false, only tables with storage
        components are returned.
      explode: true
      in: query
      name: include_declared
      required: false
      schema:
        default: true
        type: boolean
      style: form
    load_detailed_metadata:
      description: |
        Whether to load detailed metadata that requires opening the dataset.
        When false (default), only `location` is required in the response.
        When true, the response includes additional metadata such as `version`, `schema`, and `stats`.
      explode: true
      in: query
      name: load_detailed_metadata
      required: false
      schema:
        default: false
        type: boolean
      style: form
    check_declared:
      description: |
        Whether to check if the table exists only as a namespace declaration
        without storage data. When false (default), the response should return
        null for `is_only_declared` unless another option such as
        `load_detailed_metadata` requires the check.
      explode: true
      in: query
      name: check_declared
      required: false
      schema:
        default: false
        type: boolean
      style: form
